<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B-READY 2025 — Business Location Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#FFFFFF;--bg2:#F8FAFC;--bg3:#F1F5F9;--border:#E2E8F0;--text:#1E293B;--text2:#475569;--text3:#94A3B8;--p1:#059669;--p1bg:rgba(34,197,94,.1);--p2:#D97706;--p2bg:rgba(245,158,11,.1);--p3:#1D4ED8;--p3bg:rgba(30,64,175,.12);--accent:#1E40AF;--hi:#3B82F6;--lo:#DC2626;--white:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1440px;margin:0 auto;padding:16px 20px}

/* Header */
.hdr{display:flex;align-items:flex-end;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
.hdr h1 span{color:var(--accent)}
.hdr .sub{font-size:12px;color:var(--text3);margin-bottom:2px}
.badge{background:var(--bg3);border:1px solid var(--border);padding:2px 10px;border-radius:20px;font-size:11px;color:var(--text2);font-weight:500}

/* Tabs */
.tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--bg2);padding:3px;border-radius:10px;border:1px solid var(--border);overflow-x:auto}
.tab{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);border:none;background:none;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.on{background:var(--accent);color:#fff}

/* Filters */
.frow{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:600}
.fg select,.fg input{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:12px;font-family:inherit;min-width:150px}
.fg select:focus,.fg input:focus{outline:none;border-color:var(--accent)}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px}
.card .cl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card .cv{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace}
.card .cd{font-size:10px;color:var(--text3);margin-top:2px}
.card.p1{border-left:3px solid var(--p1)} .card.p2{border-left:3px solid var(--p2)} .card.p3{border-left:3px solid var(--p3)}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}

/* Chart */
.cb{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.cb h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2)}
.cw{position:relative;height:300px} .cw.tall{height:450px} .cw.xtall{height:550px}

/* Table */
.tw{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:10px}
.st{max-height:560px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{position:sticky;top:0;background:var(--bg3);padding:8px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--border);z-index:2}
th:hover{color:var(--accent)}
td{padding:6px 10px;border-bottom:1px solid #F1F5F9;white-space:nowrap}
tr:hover td{background:rgba(37,99,235,.04)}
.sa{font-size:9px;margin-left:3px}

/* Score bar */
.sb{display:flex;align-items:center;gap:6px}
.sb .br{height:5px;border-radius:3px;background:#E2E8F0;width:70px;overflow:hidden}
.sb .br .fl{height:100%;border-radius:3px}
.sb .nm{font-family:'JetBrains Mono',monospace;font-size:11px;min-width:32px}

/* Pills */
.pl{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.pl-r{background:rgba(30,64,175,.1);color:var(--accent)}
.pl-i{background:rgba(180,83,9,.1);color:#92400E}

/* Profile */
.ph{display:flex;gap:20px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.ph h2{font-size:20px;font-weight:700}
.ps{font-size:44px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.pbars{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.pb{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.pb .pl2{font-size:10px;color:var(--text3);margin-bottom:4px}
.pb .pv{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.pb.b1{border-top:3px solid var(--p1)} .pb.b1 .pv{color:var(--p1)}
.pb.b2{border-top:3px solid var(--p2)} .pb.b2 .pv{color:var(--p2)}
.pb.b3{border-top:3px solid var(--p3)} .pb.b3 .pv{color:var(--p3)}

/* Compare */
.cpanel{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.ccard h3{font-size:14px;font-weight:700;margin-bottom:3px}
.ccard .cm{font-size:10px;color:var(--text3);margin-bottom:12px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #F1F5F9}
.crow .rl{font-size:11px;color:var(--text2)} .crow .rv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}

/* Indicator explorer */
.ind-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:14px}
.ind-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.ind-header h2{font-size:16px;font-weight:700}

/* Link style */
a.elink{color:var(--accent);text-decoration:none;font-weight:500}
a.elink:hover{text-decoration:underline}

/* Eco select */
.esel{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end}
</style>
</head>

const DATA = RAW.economies;
const HIER = RAW.hierarchy;
const INDS = RAW.indicators;
const AGG = RAW.agg_keys;

const REGIONS = [...new Set(DATA.map(d=>d.region))].sort();
const INCOMES = ['Low income','Lower middle income','Upper middle income','High income'];
const PC = {p1:'#22C55E',p2:'#F59E0B',p3:'#3B82F6'};
const PN = {p1:'Pillar 1: Regulatory Quality',p2:'Pillar 2: Public Services',p3:'Pillar 3: Oper. Efficiency'};

// Build subcategory list
const SC_LIST = Object.keys(HIER).sort((a,b)=>{
  const pa = HIER[a].pillar, pb = HIER[b].pillar;
  return pa!==pb ? pa-pb : a.localeCompare(b);
});

// Metric map for categories
const CATS = {
  c11:{k:'Category_1_1_Overall',l:'1.1 Property Transfer',p:1},
  c12:{k:'Category_1_2_Overall',l:'1.2 Building/Zoning',p:1},
  c13:{k:'Category_1_3_Overall',l:'1.3 Ownership Restrictions',p:1},
  c14:{k:'Category_1_4_Overall',l:'1.4 Env. Permits',p:1},
  c21:{k:'Category_2_1_Overall',l:'2.1 Digital Services',p:2},
  c22:{k:'Category_2_2_Overall',l:'2.2 Interoperability',p:2},
  c23:{k:'Category_2_3_Overall',l:'2.3 Transparency',p:2},
  c31:{k:'Category_3_1_Overall',l:'3.1 PT Efficiency',p:3},
  c32:{k:'Category_3_2_Overall',l:'3.2 Construction Permits',p:3},
  c33:{k:'Category_3_3_Overall',l:'3.3 Env. Permits',p:3},
};
const CAT_KEYS = Object.keys(CATS);

// Subcategory agg keys
const SC_AGG = {};
for(const [k,v] of Object.entries(AGG)){
  if(k.includes('Subcategory')){
    // Extract sc number like "1.1.1" from "Subcategory_1_1_1_Overall"
    const m = k.match(/Subcategory_(\d+)_(\d+)_(\d+)/);
    if(m) SC_AGG[`${m[1]}.${m[2]}.${m[3]}`] = k;
  }
}

// All metric options for scatter
const METRIC_OPTS = [
  {k:'Business_Location_Overall',l:'BL Overall'},
  {k:'Pillar_1_Overall',l:'Pillar 1'},
  {k:'Pillar_2_Overall',l:'Pillar 2'},
  {k:'Pillar_3_Overall',l:'Pillar 3'},
  ...CAT_KEYS.map(c=>({k:CATS[c].k,l:CATS[c].l})),
  ...Object.entries(SC_AGG).map(([num,key])=>({k:key,l:`SC ${num}`}))
];

// ═════════════ STATE ═════════════
let S = {
  tab:'overview', region:'All', income:'All', search:'',
  sortCol:'Business_Location_Overall', sortDir:'desc',
  profile:'Italy',
  compare:['Italy','Georgia','Rwanda','Singapore'],
  scX:'Pillar_1_Overall', scY:'Pillar_2_Overall',
  explorerSC: SC_LIST[0],
};

function filt(){
  return DATA.filter(d=>{
    if(S.region!=='All' && d.region!==S.region) return false;
    if(S.income!=='All' && d.income!==S.income) return false;
    if(S.search && !d.economy.toLowerCase().includes(S.search.toLowerCase())) return false;
    return true;
  });
}

// ═════════════ UTIL ═════════════
function avg(arr){if(!arr.length)return 0;return arr.reduce((a,b)=>a+b,0)/arr.length}
function med(arr){if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2}
function scolor(v){return v>=75?'#047857':v>=50?'#B45309':'#B91C1C'}
function pcolor(p){return p===1?'#059669':p===2?'#D97706':'#1D4ED8'}
function sbar(val,color){
  const c=color||scolor(val);
  return `<div class="sb"><div class="nm" style="color:${c}">${val!=null?val.toFixed(1):'-'}</div><div class="br"><div class="fl" style="width:${val||0}%;background:${c}"></div></div></div>`;
}
function truncR(r){return r.length>22?r.slice(0,20)+'…':r}

let CH={};
function destroyCH(){Object.values(CH).forEach(c=>c.destroy());CH={}}
const GRID={color:'rgba(0,0,0,.06)'};
const TICK={color:'#64748B',font:{size:10}};

// ═════════════ RENDER ═════════════
function render(){
  destroyCH();
  const f=filt();
  let h='';

  h+=`<div class="hdr"><div><h1>B-READY 2025 <span>Business Location</span></h1><div class="sub">Interactive Data Explorer · ${DATA.length} Economies · 114 Indicators</div></div><span class="badge">${f.length} shown</span></div>`;

  const tabs=[{id:'overview',l:'Overview'},{id:'rankings',l:'Rankings'},{id:'explorer',l:'Indicator Explorer'},{id:'profile',l:'Economy Profile'},{id:'compare',l:'Compare'},{id:'scatter',l:'Scatter Plot'}];
  h+=`<div class="tabs">${tabs.map(t=>`<button class="tab ${S.tab===t.id?'on':''}" onclick="ss({tab:'${t.id}'})">${t.l}</button>`).join('')}</div>`;

  h+=`<div class="frow">
    <div class="fg"><label>Region</label><select onchange="ss({region:this.value})"><option value="All">All Regions</option>${REGIONS.map(r=>`<option ${S.region===r?'selected':''}>${r}</option>`).join('')}</select></div>
    <div class="fg"><label>Income Group</label><select onchange="ss({income:this.value})"><option value="All">All Income Groups</option>${INCOMES.map(i=>`<option ${S.income===i?'selected':''}>${i}</option>`).join('')}</select></div>
    <div class="fg"><label>Search</label><input type="text" placeholder="Economy…" value="${S.search}" oninput="ss({search:this.value})"></div>
  </div>`;

  if(S.tab==='overview') h+=rOverview(f);
  else if(S.tab==='rankings') h+=rRankings(f);
  else if(S.tab==='explorer') h+=rExplorer(f);
  else if(S.tab==='profile') h+=rProfile(f);
  else if(S.tab==='compare') h+=rCompare();
  else if(S.tab==='scatter') h+=rScatter(f);

  document.getElementById('app').innerHTML=h;
  requestAnimationFrame(()=>{
    if(S.tab==='overview') iOverview(f);
    else if(S.tab==='explorer') iExplorer(f);
    else if(S.tab==='scatter') iScatter(f);
    else if(S.tab==='profile') iProfile();
    else if(S.tab==='compare') iCompare();
  });
}

// ═════════════ OVERVIEW ═════════════

    <div class="card"><div class="cl">Lowest</div><div class="cv" style="font-size:16px">${bot?bot.economy:'-'}</div><div class="cd">${bot?bot.Business_Location_Overall.toFixed(1):'-'}</div></div>

  h+=`<div class="g2">
    <div class="cb"><h3>BL Score Distribution</h3><div class="cw"><canvas id="ch_dist"></canvas></div></div>
    <div class="cb"><h3>Pillar Averages by Region</h3><div class="cw"><canvas id="ch_regP"></canvas></div></div>

  </div>`;

  h+=`<div class="cb" style="margin-bottom:14px"><h3>Average Category Scores</h3><div class="cw"><canvas id="ch_cat"></canvas></div></div>`;

    <div class="cb"><h3>Category Averages by Income Group</h3><div class="cw tall"><canvas id="ch_catInc"></canvas></div></div>

  return h;

function iOverview(f){
  // Distribution
  const bins=Array(10).fill(0);
  f.forEach(d=>{const b=Math.min(Math.floor((d.Business_Location_Overall||0)/10),9);bins[b]++});
  CH.dist=new Chart(document.getElementById('ch_dist'),{type:'bar',data:{labels:bins.map((_,i)=>`${i*10}-${i*10+10}`),datasets:[{data:bins,backgroundColor:'rgba(29,78,216,.65)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:GRID,ticks:TICK},y:{grid:GRID,ticks:TICK}}}});

  // Region pillars
  const rData={};
  REGIONS.forEach(r=>{const rd=f.filter(d=>d.region===r);if(rd.length)rData[r]={p1:avg(rd.map(d=>d.Pillar_1_Overall)),p2:avg(rd.map(d=>d.Pillar_2_Overall)),p3:avg(rd.map(d=>d.Pillar_3_Overall)),n:rd.length}});
  CH.regP=new Chart(document.getElementById('ch_regP'),{type:'bar',data:{labels:Object.keys(rData).map(truncR),datasets:[{label:'P1',data:Object.values(rData).map(v=>v.p1.toFixed(1)),backgroundColor:'rgba(5,150,105,.7)'},{label:'P2',data:Object.values(rData).map(v=>v.p2.toFixed(1)),backgroundColor:'rgba(217,119,6,.7)'},{label:'P3',data:Object.values(rData).map(v=>v.p3.toFixed(1)),backgroundColor:'rgba(29,78,216,.7)'}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{labels:{color:'#64748B',font:{size:10}}}},scales:{x:{max:100,grid:GRID,ticks:TICK},y:{grid:{display:false},ticks:{...TICK,font:{size:9}}}}}});

  // Income pillars

  // Pillar gap
  const gapData=f.map(d=>({x:d.Pillar_1_Overall||0,y:d.Pillar_2_Overall||0,label:d.economy}));
  CH.gap=new Chart(document.getElementById('ch_gap'),{type:'scatter',data:{datasets:[{data:gapData,backgroundColor:'rgba(29,78,216,.6)',pointRadius:4,pointHoverRadius:7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw.label}: P1=${ctx.raw.x.toFixed(1)}, P2=${ctx.raw.y.toFixed(1)}`}}},scales:{x:{title:{display:true,text:'Pillar 1',color:'#64748B'},grid:GRID,ticks:TICK},y:{title:{display:true,text:'Pillar 2',color:'#64748B'},grid:GRID,ticks:TICK}}}});

  // Category averages
  const catAvg=CAT_KEYS.map(c=>avg(f.map(d=>d[CATS[c].k]).filter(v=>v!=null)));
  const catCol=CAT_KEYS.map(c=>pcolor(CATS[c].p)+'BB');

  });
  CH.catReg=new Chart(document.getElementById('ch_catReg'),{type:'bar',data:{labels:CAT_KEYS.map(c=>CATS[c].l),datasets:regCatDS},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748B',font:{size:9}},position:'bottom'}},scales:{x:{grid:{display:false},ticks:{...TICK,font:{size:9},maxRotation:45}},y:{grid:GRID,ticks:TICK}}}});

// ═════════════ RANKINGS ═════════════
function rRankings(f){
  const tc=['economy','region','income'];
  const sorted=f.slice().sort((a,b)=>{const c=S.sortCol;if(tc.includes(c)){const r=(a[c]||'').localeCompare(b[c]||'');return S.sortDir==='desc'?-r:r}return S.sortDir==='desc'?(b[c]||0)-(a[c]||0):(a[c]||0)-(b[c]||0)});
  const ar=c=>S.sortCol===c?(S.sortDir==='desc'?'▼':'▲'):'';

  const cols=[
    {k:'economy',l:'Economy'},{k:'region',l:'Region'},{k:'income',l:'Income'},
    {k:'Business_Location_Overall',l:'BL Overall'},
    {k:'Pillar_1_Overall',l:'Pillar 1'},{k:'Pillar_2_Overall',l:'Pillar 2'},{k:'Pillar_3_Overall',l:'Pillar 3'},
    ...CAT_KEYS.map(c=>({k:CATS[c].k,l:CATS[c].l}))
  ];

  let h=`<div class="tw"><div class="st"><table><thead><tr>${cols.map(c=>`<th onclick="tsort('${c.k}')">${c.l}<span class="sa">${ar(c.k)}</span></th>`).join('')}</tr></thead><tbody>`;
  sorted.forEach(d=>{
    h+=`<tr><td><a class="elink" href="#" onclick="event.preventDefault();ss({tab:'profile',profile:'${d.economy.replace(/'/g,"\\'")}'})">${d.economy}</a></td>`;
    h+=`<td><span class="pl pl-r">${truncR(d.region||'-')}</span></td>`;
    h+=`<td><span class="pl pl-i">${d.income||'-'}</span></td>`;
    h+=`<td>${sbar(d.Business_Location_Overall)}</td>`;
    h+=`<td>${sbar(d.Pillar_1_Overall,'#059669')}</td>`;
    h+=`<td>${sbar(d.Pillar_2_Overall,'#D97706')}</td>`;
    h+=`<td>${sbar(d.Pillar_3_Overall,'#1D4ED8')}</td>`;
    CAT_KEYS.forEach(c=>{
      const v=d[CATS[c].k];
      h+=`<td>${sbar(v,pcolor(CATS[c].p))}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}

// ═════════════ INDICATOR EXPLORER ═════════════
function rExplorer(f){
  let h=`<div class="ind-header"><h2>Indicator Explorer</h2></div>`;
  h+=`<div class="frow">
    <div class="fg"><label>Subcategory</label><select id="scSelect" onchange="ss({explorerSC:this.value})" style="min-width:320px">
      ${SC_LIST.map(sc=>`<option value="${sc}" ${S.explorerSC===sc?'selected':''}>[P${HIER[sc].pillar}] ${sc}</option>`).join('')}
    </select></div>
  </div>`;

  const sc=S.explorerSC;
  const info=HIER[sc];
  if(!info) return h+'<p>Select a subcategory</p>';

  const indicators=info.indicators;
  const scNum=sc.match(/^(\d+\.\d+\.\d+)/);
  const scAggKey=scNum?SC_AGG[scNum[1]]:null;

  // Summary cards for subcategory
  if(scAggKey){
    const vals=f.map(d=>d[scAggKey]).filter(v=>v!=null);
    h+=`<div class="cards">
      <div class="card" style="border-left:3px solid ${pcolor(info.pillar)}"><div class="cl">Subcategory Avg</div><div class="cv" style="color:${pcolor(info.pillar)}">${vals.length?avg(vals).toFixed(1):'-'}</div><div class="cd">${sc}</div></div>
      <div class="card"><div class="cl">Median</div><div class="cv">${vals.length?med(vals).toFixed(1):'-'}</div></div>
      <div class="card"><div class="cl">Min</div><div class="cv" style="color:var(--lo)">${vals.length?Math.min(...vals).toFixed(1):'-'}</div></div>
      <div class="card"><div class="cl">Max</div><div class="cv" style="color:var(--p1)">${vals.length?Math.max(...vals).toFixed(1):'-'}</div></div>
      <div class="card"><div class="cl"># Indicators</div><div class="cv">${indicators.length}</div></div>
    </div>`;
  }

  // Charts: Regional + Income breakdown of subcategory
  h+=`<div class="g2">
    <div class="cb"><h3>Subcategory Score by Region</h3><div class="cw"><canvas id="ch_exReg"></canvas></div></div>
    <div class="cb"><h3>Subcategory Score by Income Group</h3><div class="cw"><canvas id="ch_exInc"></canvas></div></div>
  </div>`;

  // Indicator-level regional averages chart
  if(indicators.length>1){
    h+=`<div class="cb" style="margin-bottom:14px"><h3>Indicator Averages by Region</h3><div class="cw tall"><canvas id="ch_exIndReg"></canvas></div></div>`;
    h+=`<div class="cb" style="margin-bottom:14px"><h3>Indicator Averages by Income Group</h3><div class="cw tall"><canvas id="ch_exIndInc"></canvas></div></div>`;
  }

  // Table: all economies with indicator values
  h+=`<div class="tw"><div class="st"><table><thead><tr><th>Economy</th><th>Region</th><th>Income</th>`;
  if(scAggKey) h+=`<th onclick="tsort('${scAggKey}')">SC Overall<span class="sa">${S.sortCol===scAggKey?(S.sortDir==='desc'?'▼':'▲'):''}</span></th>`;
  indicators.forEach(ind=>{
    const short=ind.name.length>35?ind.name.slice(0,33)+'…':ind.name;
    h+=`<th title="${ind.name}" onclick="tsort('${ind.key}')">${short}<span class="sa">${S.sortCol===ind.key?(S.sortDir==='desc'?'▼':'▲'):''}</span></th>`;
  });
  h+=`</tr></thead><tbody>`;

  const tc2=['economy','region','income'];
  const sorted2=f.slice().sort((a,b)=>{const c=S.sortCol;if(tc2.includes(c)){const r=(a[c]||'').localeCompare(b[c]||'');return S.sortDir==='desc'?-r:r}return S.sortDir==='desc'?(b[c]||0)-(a[c]||0):(a[c]||0)-(b[c]||0)});

  sorted2.forEach(d=>{
    h+=`<tr><td><a class="elink" href="#" onclick="event.preventDefault();ss({tab:'profile',profile:'${d.economy.replace(/'/g,"\\'")}'})">${d.economy}</a></td>`;
    h+=`<td><span class="pl pl-r">${truncR(d.region||'')}</span></td><td><span class="pl pl-i">${d.income||''}</span></td>`;
    if(scAggKey) h+=`<td>${sbar(d[scAggKey],pcolor(info.pillar))}</td>`;
    indicators.forEach(ind=>{
      const v=d[ind.key];
      h+=`<td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${v!=null?scolor(v*10):'var(--text3)'}">${v!=null?v.toFixed(2):'-'}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}

function iExplorer(f){
  const sc=S.explorerSC;
  const info=HIER[sc];
  if(!info) return;
  const scNum=sc.match(/^(\d+\.\d+\.\d+)/);
  const scAggKey=scNum?SC_AGG[scNum[1]]:null;
  const indicators=info.indicators;
  const palette7=['#1E40AF','#047857','#B45309','#1D4ED8','#0369A1','#0E7490','#4D7C0F'];
  const incColors=['#B91C1C','#B45309','#047857','#1D4ED8'];

  // Region chart for subcategory
  if(scAggKey){
    const regsPresent=REGIONS.filter(r=>f.some(d=>d.region===r));
    const rAvgs=regsPresent.map(r=>{const rd=f.filter(d=>d.region===r);return avg(rd.map(d=>d[scAggKey]).filter(v=>v!=null))});
    const rCounts=regsPresent.map(r=>f.filter(d=>d.region===r).length);
    CH.exReg=new Chart(document.getElementById('ch_exReg'),{type:'bar',data:{labels:regsPresent.map(truncR),datasets:[{data:rAvgs.map(v=>v.toFixed(2)),backgroundColor:pcolor(info.pillar)+'CC',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:(ctx)=>`n = ${rCounts[ctx.dataIndex]}`}}},scales:{x:{grid:{display:false},ticks:{...TICK,font:{size:9}}},y:{grid:GRID,ticks:TICK}}}});

    // Income chart
    const incsPresent=INCOMES.filter(inc=>f.some(d=>d.income===inc));
    const iAvgs=incsPresent.map(inc=>{const id=f.filter(d=>d.income===inc);return avg(id.map(d=>d[scAggKey]).filter(v=>v!=null))});
    const iCounts=incsPresent.map(inc=>f.filter(d=>d.income===inc).length);
    CH.exInc=new Chart(document.getElementById('ch_exInc'),{type:'bar',data:{labels:incsPresent,datasets:[{data:iAvgs.map(v=>v.toFixed(2)),backgroundColor:incColors.slice(0,incsPresent.length).map(c=>c+'99'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:(ctx)=>`n = ${iCounts[ctx.dataIndex]}`}}},scales:{x:{grid:{display:false},ticks:TICK},y:{grid:GRID,ticks:TICK}}}});
  }

  // Indicator-level by region
  if(indicators.length>1 && document.getElementById('ch_exIndReg')){
    const regsPresent=REGIONS.filter(r=>f.some(d=>d.region===r));
    const dsReg=regsPresent.map((r,ri)=>{
      const rd=f.filter(d=>d.region===r);
      return{label:truncR(r),data:indicators.map(ind=>avg(rd.map(d=>d[ind.key]).filter(v=>v!=null)).toFixed(3)),backgroundColor:palette7[ri%7]+'BB',borderColor:palette7[ri%7],borderWidth:1,borderRadius:2};
    });
    const indLabels=indicators.map(ind=>ind.name.length>30?ind.name.slice(0,28)+'…':ind.name);
    CH.exIndReg=new Chart(document.getElementById('ch_exIndReg'),{type:'bar',data:{labels:indLabels,datasets:dsReg},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{labels:{color:'#64748B',font:{size:9}},position:'bottom'}},scales:{x:{grid:GRID,ticks:TICK},y:{grid:{display:false},ticks:{...TICK,font:{size:8}}}}}});

    // Indicator-level by income
    const incsPresent=INCOMES.filter(inc=>f.some(d=>d.income===inc));
    const dsInc=incsPresent.map((inc,ii)=>{
      const id=f.filter(d=>d.income===inc);
      return{label:inc,data:indicators.map(ind=>avg(id.map(d=>d[ind.key]).filter(v=>v!=null)).toFixed(3)),backgroundColor:incColors[ii%4]+'BB',borderColor:incColors[ii%4],borderWidth:1,borderRadius:2};
    });
    CH.exIndInc=new Chart(document.getElementById('ch_exIndInc'),{type:'bar',data:{labels:indLabels,datasets:dsInc},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{labels:{color:'#64748B',font:{size:9}},position:'bottom'}},scales:{x:{grid:GRID,ticks:TICK},y:{grid:{display:false},ticks:{...TICK,font:{size:8}}}}}});
  }
}

// ═════════════ PROFILE ═════════════
function rProfile(f){
  let h=`<div class="fg" style="margin-bottom:14px"><label>Select Economy</label><select onchange="ss({profile:this.value})">
    ${DATA.slice().sort((a,b)=>a.economy.localeCompare(b.economy)).map(d=>`<option ${S.profile===d.economy?'selected':''}>${d.economy}</option>`).join('')}
  </select></div>`;

  const eco=DATA.find(d=>d.economy===S.profile);
  if(!eco) return h+'<p>Economy not found</p>';

  const gr=DATA.slice().sort((a,b)=>(b.Business_Location_Overall||0)-(a.Business_Location_Overall||0)).findIndex(d=>d.economy===eco.economy)+1;
  const rp=DATA.filter(d=>d.region===eco.region).sort((a,b)=>(b.Business_Location_Overall||0)-(a.Business_Location_Overall||0));
  const rr=rp.findIndex(d=>d.economy===eco.economy)+1;

  h+=`<div class="ph"><div class="ps">${(eco.Business_Location_Overall||0).toFixed(1)}</div><div><h2>${eco.economy}</h2><div style="display:flex;gap:6px;margin-top:3px"><span class="pl pl-r">${eco.region}</span><span class="pl pl-i">${eco.income}</span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">Global: <b style="color:var(--text)">#${gr}</b>/${DATA.length} · Regional: <b style="color:var(--text)">#${rr}</b>/${rp.length}</div></div></div>`;

  h+=`<div class="pbars">
    <div class="pb b1"><div class="pl2">Pillar 1 — Regulatory Quality</div><div class="pv">${(eco.Pillar_1_Overall||0).toFixed(1)}</div></div>
    <div class="pb b2"><div class="pl2">Pillar 2 — Public Services</div><div class="pv">${(eco.Pillar_2_Overall||0).toFixed(1)}</div></div>
    <div class="pb b3"><div class="pl2">Pillar 3 — Oper. Efficiency</div><div class="pv">${(eco.Pillar_3_Overall||0).toFixed(1)}</div></div>
  </div>`;

  h+=`<div class="g2"><div class="cb"><h3>Category Radar (vs Global Mean)</h3><div class="cw"><canvas id="ch_profR"></canvas></div></div><div class="cb"><h3>Category Scores</h3>`;
  CAT_KEYS.forEach(c=>{const v=eco[CATS[c].k];h+=`<div class="crow"><span class="rl">${CATS[c].l}</span>${sbar(v,pcolor(CATS[c].p))}</div>`});
  h+=`</div></div>`;

  // Subcategory breakdown table
  h+=`<div class="tw" style="margin-bottom:14px"><table><thead><tr><th>Subcategory</th><th>Pillar</th><th>Score</th></tr></thead><tbody>`;
  SC_LIST.forEach(sc=>{
    const scNum=sc.match(/^(\d+\.\d+\.\d+)/);
    const k=scNum?SC_AGG[scNum[1]]:null;
    const v=k?eco[k]:null;
    const p=HIER[sc].pillar;
    h+=`<tr><td style="font-size:11px;max-width:300px;white-space:normal">${sc}</td><td style="color:${pcolor(p)}">P${p}</td><td>${sbar(v,pcolor(p))}</td></tr>`;
  });
  h+=`</tbody></table></div>`;

  return h;
}

function iProfile(){
  const eco=DATA.find(d=>d.economy===S.profile);
  if(!eco) return;
  const catVals=CAT_KEYS.map(c=>eco[CATS[c].k]||0);
  const globalAvg=CAT_KEYS.map(c=>avg(DATA.map(d=>d[CATS[c].k]).filter(v=>v!=null)));
  CH.profR=new Chart(document.getElementById('ch_profR'),{type:'radar',data:{labels:CAT_KEYS.map(c=>CATS[c].l),datasets:[{label:eco.economy,data:catVals,backgroundColor:'rgba(30,64,175,.12)',borderColor:'rgba(30,64,175,.85)',pointBackgroundColor:'#1E40AF',pointRadius:4},{label:'Global Mean',data:globalAvg,backgroundColor:'rgba(180,83,9,.08)',borderColor:'rgba(180,83,9,.6)',borderDash:[4,4],pointRadius:2,pointBackgroundColor:'#B45309'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748B',font:{size:10}}}},scales:{r:{beginAtZero:true,max:50,grid:GRID,angleLines:GRID,pointLabels:{color:'#64748B',font:{size:9}},ticks:{display:false}}}}});
}

// ═════════════ COMPARE ═════════════
function rCompare(){
  const all=DATA.slice().sort((a,b)=>a.economy.localeCompare(b.economy));
  let h=`<div class="esel">`;
  for(let i=0;i<4;i++){
    const sel=S.compare[i]||'';
    h+=`<div class="fg"><label>Economy ${i+1}</label><select onchange="uc(${i},this.value)"><option value="">— None —</option>${all.map(d=>`<option ${sel===d.economy?'selected':''}>${d.economy}</option>`).join('')}</select></div>`;
  }
  h+=`</div>`;

  const ecos=S.compare.map(n=>DATA.find(d=>d.economy===n)).filter(Boolean);
  if(ecos.length<2){h+='<p style="color:var(--text3)">Select at least 2 economies.</p>';return h}

  h+=`<div class="cb" style="margin-bottom:14px"><h3>Category Radar Comparison</h3><div class="cw"><canvas id="ch_comp"></canvas></div></div>`;

  h+=`<div class="cpanel">`;
  ecos.forEach(eco=>{
    h+=`<div class="ccard"><h3>${eco.economy}</h3><div class="cm">${eco.region} · ${eco.income}</div>`;
    h+=`<div class="crow"><span class="rl">BL Overall</span><span class="rv" style="color:${scolor(eco.Business_Location_Overall)}">${(eco.Business_Location_Overall||0).toFixed(1)}</span></div>`;
    ['Pillar_1_Overall','Pillar_2_Overall','Pillar_3_Overall'].forEach((p,pi)=>{
      h+=`<div class="crow"><span class="rl">${['Pillar 1','Pillar 2','Pillar 3'][pi]}</span><span class="rv" style="color:${['#059669','#D97706','#1D4ED8'][pi]}">${(eco[p]||0).toFixed(1)}</span></div>`;
    });
    CAT_KEYS.forEach(c=>{h+=`<div class="crow"><span class="rl">${CATS[c].l}</span><span class="rv">${(eco[CATS[c].k]||0).toFixed(1)}</span></div>`});
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

function iCompare(){
  const el=document.getElementById('ch_comp');
  if(!el)return;
  const ecos=S.compare.map(n=>DATA.find(d=>d.economy===n)).filter(Boolean);
  if(ecos.length<2)return;
  const colors=['#1E40AF','#047857','#B45309','#1D4ED8'];
  CH.comp=new Chart(el,{type:'radar',data:{labels:CAT_KEYS.map(c=>CATS[c].l),datasets:ecos.map((e,i)=>({label:e.economy,data:CAT_KEYS.map(c=>e[CATS[c].k]||0),backgroundColor:colors[i]+'22',borderColor:colors[i],pointBackgroundColor:colors[i],pointRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748B',font:{size:10}}}},scales:{r:{beginAtZero:true,max:50,grid:GRID,angleLines:GRID,pointLabels:{color:'#64748B',font:{size:9}},ticks:{display:false}}}}});
}

// ═════════════ SCATTER ═════════════
function rScatter(f){
  const optH=METRIC_OPTS.map(o=>`<option value="${o.k}" ${S.scX===o.k?'selected':''}>${o.l}</option>`).join('');
  const optV=METRIC_OPTS.map(o=>`<option value="${o.k}" ${S.scY===o.k?'selected':''}>${o.l}</option>`).join('');
  let h=`<div class="frow" style="margin-bottom:14px">
    <div class="fg"><label>X Axis</label><select onchange="ss({scX:this.value})">${optH}</select></div>
    <div class="fg"><label>Y Axis</label><select onchange="ss({scY:this.value})">${optV}</select></div>
  </div>`;
  const xLab=METRIC_OPTS.find(o=>o.k===S.scX)?.l||S.scX;
  const yLab=METRIC_OPTS.find(o=>o.k===S.scY)?.l||S.scY;
  h+=`<div class="cb"><h3>${xLab} vs ${yLab}</h3><div class="cw xtall"><canvas id="ch_sc"></canvas></div></div>`;
  return h;
}

function iScatter(f){
  const el=document.getElementById('ch_sc');
  if(!el) return;
  const palette=['#1E40AF','#047857','#B45309','#1D4ED8','#0369A1','#0E7490','#4D7C0F'];
  const regsPresent=REGIONS.filter(r=>f.some(d=>d.region===r));
  const ds=regsPresent.map((r,ri)=>{
    const pts=f.filter(d=>d.region===r).map(d=>({x:d[S.scX]||0,y:d[S.scY]||0,label:d.economy}));
    return{label:truncR(r),data:pts,backgroundColor:palette[ri%7]+'AA',borderColor:palette[ri%7],pointRadius:5,pointHoverRadius:8};
  });
  const xLab=METRIC_OPTS.find(o=>o.k===S.scX)?.l||S.scX;
  const yLab=METRIC_OPTS.find(o=>o.k===S.scY)?.l||S.scY;
  CH.sc=new Chart(el,{type:'scatter',data:{datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748B',font:{size:10}},position:'bottom'},tooltip:{callbacks:{label:ctx=>`${ctx.raw.label}: (${ctx.raw.x.toFixed(1)}, ${ctx.raw.y.toFixed(1)})`}}},scales:{x:{title:{display:true,text:xLab,color:'#64748B'},grid:GRID,ticks:TICK},y:{title:{display:true,text:yLab,color:'#64748B'},grid:GRID,ticks:TICK}}}});
}

// ═════════════ ACTIONS ═════════════
function ss(p){Object.assign(S,p);render()}
function tsort(c){if(S.sortCol===c)S.sortDir=S.sortDir==='desc'?'asc':'desc';else{S.sortCol=c;S.sortDir='desc'}render()}
function uc(i,v){const a=[...S.compare];a[i]=v;S.compare=a;render()}

render();
</script>
</body>
</html>
